<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#e7c98f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Broomstick Chase" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.webp" />
  <link rel="preload" as="image" href="assets/scene-01-gate.webp" fetchpriority="high" />
  <title>Campus Broomstick Chase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back-link" href="../" style="position:fixed;left:12px;top:12px;z-index:999;color:#1b140f;background:#f7e6b8;padding:8px 10px;border-radius:8px;text-decoration:none;font-weight:600;">← 回到邀請函</a>
  <main class="page-shell page-shell-simple">
    <section class="game-only" aria-label="Campus Broomstick Chase game">
      <div class="game-frame">
        <canvas id="gameCanvas" width="1280" height="720" aria-label="Campus Broomstick Chase game canvas"></canvas>
        <div class="paper-grain" aria-hidden="true"></div>

        <section id="startScreen" class="overlay-card show" aria-live="polite">
          <h2>Start</h2>
          <p>Start at the school gate, collect soccer balls, pass seven campus scenes, and return to the school gate.</p>
          <button type="button" class="primary-btn" id="startBtn">START GAME <span>▶</span></button>
        </section>

        <section id="pauseScreen" class="overlay-card compact" aria-live="polite">
          <h2>Paused</h2>
          <button type="button" class="primary-btn" id="resumeBtn">RESUME <span>▶</span></button>
        </section>

        <section id="gameOverScreen" class="overlay-card compact" aria-live="polite">
          <h2 id="gameOverTitle">Nice flight!</h2>
          <p id="finalScore">Score: 0</p>
          <button type="button" class="primary-btn" id="restartBtn">PLAY AGAIN <span>↻</span></button>
        </section>
      </div>

      <div class="mobile-controls" aria-label="Touch controls">
        <button type="button" class="control-btn" id="upBtn" aria-label="Move up"><span class="control-icon">▲</span><small>UP</small></button>
        <button type="button" class="control-btn boost" id="boostBtn" aria-label="Boost"><span class="control-icon">⚡</span><small>BOOST</small></button>
        <button type="button" class="control-btn" id="downBtn" aria-label="Move down"><span class="control-icon">▼</span><small>DOWN</small></button>
        <button type="button" class="control-btn pause" id="pauseBtn" aria-label="Pause"><span class="control-icon">Ⅱ</span><small>PAUSE</small></button>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
