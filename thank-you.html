<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>謝謝你的回覆</title>
  <style>
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#081018;
      color:#f6e3c4;
      font-family: "Noto Serif TC", "Times New Roman", serif;
      text-align:center;
      padding:24px;
    }
    .card{
      max-width:620px;
      width:100%;
      padding:32px;
      border-radius:22px;
      background:linear-gradient(180deg,rgba(255,247,227,.95),rgba(226,196,139,.95));
      box-shadow:0 28px 70px rgba(0,0,0,.28);
      color:#3f2d1c;
    }
    h1{margin:0 0 16px; font-size:clamp(2.4rem,5vw,3.8rem);}
    p{margin:0 0 24px; line-height:1.9; font-size:1.05rem;}
    a{display:inline-block; padding:12px 22px; border-radius:999px; background:#755337; color:#fff; text-decoration:none; font-weight:700; box-shadow:0 12px 28px rgba(0,0,0,.2);}
    a:hover{transform:translateY(-2px);}
  </style>
</head>
<body>
  <div class="card">
    <h1>謝謝你的回覆！</h1>
    <p>我們已經收到你的資訊。請回到掃把遊戲或繼續瀏覽網站，期待在同學會見到你。</p>
    <a href="index.html">回到首頁</a>
  </div>
</body>
</html>
